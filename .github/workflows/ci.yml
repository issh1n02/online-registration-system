name: Java CI and Docker Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build & Test (JDK 11, Maven)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Run Maven tests
        run: mvn clean test

      - name: Package application (skip tests, already run)
        run: mvn package -DskipTests

      - name: List target directory
        run: ls -la target/

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/online-registration-system.jar

  docker-build:
    name: Docker Build & Verify
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar

      - name: Move JAR to target directory
        run: |
          mkdir -p target
          mv online-registration-system.jar target/
          ls -la target/

      - name: Build Docker image
        run: |
          docker build -t online-registration-system:ci .
          docker images | grep online-registration-system

      - name: Verify Docker image
        run: |
          echo "Docker image built successfully"
          docker images online-registration-system:ci
